<div class="container mt-5">

  <h1 class="display-4 text-center mb-5">Insira as seleções</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="d-flex gap-5 justify-content-center align-items-start">

      <!-- Seleção 1 -->
      <div class="text-center" style="width: 200px">
        <img *ngIf="team1Selected" [src]="teamService.getFlagUrl(team1Selected.name)"
          width="160" class="mb-3 border rounded shadow-sm">
        <input
          type="text"
          class="form-control"
          formControlName="team1"
          [ngbTypeahead]="search"
          [inputFormatter]="formatter"
          [resultFormatter]="formatter"
          (selectItem)="onTeam1Select($event)"
          placeholder="Buscar seleção..."
        />
      </div>

      <div class="align-self-center display-5 fw-bold">vs</div>

      <!-- Seleção 2 -->
      <div class="text-center" style="width: 200px">
        <img *ngIf="team2Selected" [src]="teamService.getFlagUrl(team2Selected.name)"
        width="160" class="mb-3 border rounded shadow-sm">
        <input
          type="text"
          class="form-control"
          formControlName="team2"
          [ngbTypeahead]="search"
          [inputFormatter]="formatter"
          [resultFormatter]="formatter"
          (selectItem)="onTeam2Select($event)"
          placeholder="Buscar seleção..."
        />
      </div>

    </div>

    <div class="text-center mt-5">
      <button type="submit" class="btn btn-primary px-4"
              [disabled]="!team1Selected || !team2Selected">
        Avançar
      </button>
    </div>

  </form>
</div>
