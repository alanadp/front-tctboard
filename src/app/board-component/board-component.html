<div class="container-fluid mt-3">

  <!-- Cabeçalho -->
  <div class="d-flex justify-content-center align-items-center gap-3 mb-4">
    <img [src]="teamService.getFlagUrl(team1.name)" width="50" class="border rounded">
    <span class="fs-4 fw-bold">{{ team1.name }}</span>
    <span class="fs-4 mx-2">vs</span>
    <span class="fs-4 fw-bold">{{ team2.name }}</span>
    <img [src]="teamService.getFlagUrl(team2.name)" width="50" class="border rounded">
  </div>

  <!-- Layout principal -->
  <div class="d-flex justify-content-center align-items-start gap-2">

    <!-- Jogadores time 1 -->
    <div style="width: 130px; max-height: 700px; overflow-y: auto;">
      <div *ngFor="let player of players1" class="text-center mb-2">
        <img [src]="player.photo" width="50" height="50"
             class="rounded border" style="object-fit: cover;"
             (error)="onImgError($event)">
        <div class="small text-truncate">{{ player.name }}</div>
      </div>
    </div>

    <!-- Campo -->
    <div class="position-relative" style="width: 500px; height: 740px; background: linear-gradient(180deg, #4a9e4a 0%, #3d8c3d 50%, #4a9e4a 100%); border-radius: 8px; border: 3px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-shrink: 0;">
      <div style="position:absolute; top:50%; left:0; right:0; height:2px; background:rgba(255,255,255,0.8);"></div>
      <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:100px; height:100px; border-radius:50%; border:2px solid rgba(255,255,255,0.8);"></div>
      <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:6px; height:6px; border-radius:50%; background:white;"></div>
      <div style="position:absolute; top:4%; left:22%; width:56%; height:18%; border:2px solid rgba(255,255,255,0.8);"></div>
      <div style="position:absolute; top:4%; left:35%; width:30%; height:8%; border:2px solid rgba(255,255,255,0.8);"></div>
      <div style="position:absolute; bottom:4%; left:22%; width:56%; height:18%; border:2px solid rgba(255,255,255,0.8);"></div>
      <div style="position:absolute; bottom:4%; left:35%; width:30%; height:8%; border:2px solid rgba(255,255,255,0.8);"></div>
      <div style="position:absolute; top:2%; left:2%; width:20px; height:20px; border-right:2px solid rgba(255,255,255,0.8); border-bottom:2px solid rgba(255,255,255,0.8);"></div>
      <div style="position:absolute; top:2%; right:2%; width:20px; height:20px; border-left:2px solid rgba(255,255,255,0.8); border-bottom:2px solid rgba(255,255,255,0.8);"></div>
      <div style="position:absolute; bottom:2%; left:2%; width:20px; height:20px; border-right:2px solid rgba(255,255,255,0.8); border-top:2px solid rgba(255,255,255,0.8);"></div>
      <div style="position:absolute; bottom:2%; right:2%; width:20px; height:20px; border-left:2px solid rgba(255,255,255,0.8); border-top:2px solid rgba(255,255,255,0.8);"></div>
    </div>

    <!-- Jogadores time 2 -->
    <div style="width: 130px; max-height: 700px; overflow-y: auto;">
      <div *ngFor="let player of players2" class="text-center mb-2">
        <img [src]="player.photo" width="50" height="50"
             class="rounded border" style="object-fit: cover;"
             (error)="onImgError($event)">
        <div class="small text-truncate">{{ player.name }}</div>
      </div>
    </div>

  </div>

  <div class="text-center mt-3 mb-4">
    <button class="btn btn-secondary" (click)="router.navigate(['/'])">Voltar</button>
  </div>

</div>
